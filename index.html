<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Cajones" />
  <title>Cajones · Residencial Bamb&uacute;</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f13;
      --surface: #18181f;
      --surface2: #22222c;
      --border: #2e2e3a;
      --accent: #e8c547;
      --accent2: #5b8dff;
      --accent3: #ff6b6b;
      --text: #f0f0f5;
      --text2: #9898aa;
      --text3: #5a5a6e;
      --cajon1: #5b8dff;
      --cajon2: #e8c547;
      --cajon3: #7ecfa4;
      --radius: 16px;
      --radius-sm: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 430px;
      margin: 0 auto;
      padding-bottom: 90px;
      overflow-x: hidden;
    }

    /* HEADER */
    header {
      padding: 52px 20px 20px;
      background: linear-gradient(180deg, #18181f 0%, transparent 100%);
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .header-title { font-size: 28px; font-weight: 600; letter-spacing: -0.5px; }
    .header-date { font-size: 13px; color: var(--text2); margin-top: 4px; font-family: 'DM Mono', monospace; }
    .btn-add {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--accent); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; color: #000; font-weight: 600;
      transition: transform 0.15s, box-shadow 0.15s;
      flex-shrink: 0;
    }
    .btn-add:active { transform: scale(0.92); }

    /* CAJONES STATUS */
    .status-section { padding: 16px 20px 8px; }
    .section-label { font-size: 11px; font-weight: 500; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 12px; }
    .cajones-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .cajon-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 12px;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s;
    }
    .cajon-card:active { transform: scale(0.97); }
    .cajon-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .cajon-card.c1::before { background: var(--cajon1); }
    .cajon-card.c2::before { background: var(--cajon2); }
    .cajon-card.c3::before { background: var(--cajon3); }
    .cajon-num { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); margin-bottom: 6px; }
    .cajon-status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #3a3a4a; display: inline-block;
      margin-right: 6px; transition: background 0.3s;
    }
    .cajon-status-dot.libre { background: #7ecfa4; box-shadow: 0 0 6px #7ecfa440; }
    .cajon-status-dot.ocupado { background: #ff6b6b; box-shadow: 0 0 6px #ff6b6b40; }
    .cajon-label { font-size: 13px; font-weight: 500; }
    .cajon-who { font-size: 11px; color: var(--text2); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* NAV TABS */
    .nav-tabs { display: flex; gap: 6px; padding: 12px 20px; }
    .nav-tab {
      flex: 1; padding: 9px 6px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: transparent;
      color: var(--text2); font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: all 0.15s; text-align: center;
    }
    .nav-tab.active {
      background: var(--accent); color: #000; border-color: var(--accent);
    }

    /* VIEWS */
    .view { display: none; padding: 0 20px; }
    .view.active { display: block; }

    /* CALENDAR VIEW */
    .week-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .week-label { font-size: 15px; font-weight: 600; }
    .week-btn {
      width: 36px; height: 36px; border-radius: 50%; background: var(--surface2);
      border: 1px solid var(--border); color: var(--text); font-size: 16px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .week-btn:active { background: var(--border); }

    .week-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 16px; }
    .day-col { text-align: center; }
    .day-name { font-size: 10px; color: var(--text3); margin-bottom: 6px; letter-spacing: 0.5px; }
    .day-num {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 500; margin: 0 auto 6px;
      cursor: pointer; transition: all 0.15s;
    }
    .day-num.today { background: var(--accent); color: #000; }
    .day-num.selected { background: var(--accent2); color: #fff; }
    .day-num:not(.today):not(.selected):hover { background: var(--surface2); }
    .day-dots { display: flex; justify-content: center; gap: 3px; min-height: 8px; }
    .day-dot { width: 5px; height: 5px; border-radius: 50%; }

    /* DAY TIMELINE */
    .day-reservas { display: flex; flex-direction: column; gap: 10px; }
    .reserva-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex; align-items: center; gap: 14px;
      position: relative; overflow: hidden;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .reserva-cajon-badge {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500;
      flex-shrink: 0;
    }
    .badge-c1 { background: #5b8dff22; color: var(--cajon1); }
    .badge-c2 { background: #e8c54722; color: var(--cajon2); }
    .badge-c3 { background: #7ecfa422; color: var(--cajon3); }
    .reserva-info { flex: 1; min-width: 0; }
    .reserva-vecino { font-size: 15px; font-weight: 500; margin-bottom: 2px; }
    .reserva-horario { font-size: 12px; color: var(--text2); font-family: 'DM Mono', monospace; }
    .reserva-nota { font-size: 12px; color: var(--text3); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .reserva-delete {
      width: 30px; height: 30px; border-radius: 8px;
      background: transparent; border: none; color: var(--text3);
      cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; flex-shrink: 0;
    }
    .reserva-delete:active { background: #ff6b6b22; color: var(--accent3); }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; }
    .empty-icon { font-size: 36px; margin-bottom: 10px; }

    /* LIST VIEW */
    .list-group { margin-bottom: 20px; }
    .list-group-label { font-size: 11px; font-weight: 500; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }

    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: rgba(24,24,31,0.92);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex; padding: 12px 30px 28px;
      gap: 0; z-index: 20;
    }
    .bnav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
      background: none; border: none; color: var(--text3);
      font-family: 'DM Sans', sans-serif; font-size: 11px; cursor: pointer;
      transition: color 0.15s; padding: 6px 0;
    }
    .bnav-btn.active { color: var(--accent); }
    .bnav-icon { font-size: 22px; }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      z-index: 100; display: flex; align-items: flex-end;
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      width: 100%; max-width: 430px; margin: 0 auto;
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      border: 1px solid var(--border);
      padding: 24px 24px 40px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-handle { width: 40px; height: 4px; border-radius: 2px; background: var(--border); margin: 0 auto 24px; }
    .modal-title { font-size: 20px; font-weight: 600; margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 12px; color: var(--text2); margin-bottom: 8px; display: block; letter-spacing: 0.5px; }
    .form-input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 15px;
      padding: 12px 14px; outline: none; transition: border-color 0.15s;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-input option { background: var(--surface2); color: var(--text); }
    .cajon-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .cajon-opt {
      padding: 12px 8px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--surface2);
      color: var(--text2); font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 500; cursor: pointer;
      text-align: center; transition: all 0.15s;
    }
    .cajon-opt.selected-c1 { border-color: var(--cajon1); background: #5b8dff22; color: var(--cajon1); }
    .cajon-opt.selected-c2 { border-color: var(--cajon2); background: #e8c54722; color: var(--cajon2); }
    .cajon-opt.selected-c3 { border-color: var(--cajon3); background: #7ecfa422; color: var(--cajon3); }
    .time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn-submit {
      width: 100%; padding: 16px; border-radius: var(--radius);
      background: var(--accent); border: none; color: #000;
      font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600;
      cursor: pointer; margin-top: 8px; transition: transform 0.15s, opacity 0.15s;
    }
    .btn-submit:active { transform: scale(0.98); opacity: 0.9; }
    .btn-cancel {
      width: 100%; padding: 14px; border-radius: var(--radius);
      background: transparent; border: 1px solid var(--border); color: var(--text2);
      font-family: 'DM Sans', sans-serif; font-size: 15px;
      cursor: pointer; margin-top: 8px;
    }

    /* PIN MODAL */
    .pin-dots { display: flex; justify-content: center; gap: 16px; margin-bottom: 28px; }
    .pin-dot {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid var(--border); background: transparent;
      transition: all 0.15s;
    }
    .pin-dot.filled { background: var(--accent); border-color: var(--accent); }
    .pin-dot.error { background: var(--accent3); border-color: var(--accent3); }
    .pin-pad {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    }
    .pin-key {
      padding: 18px 10px; border-radius: var(--radius);
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 20px; font-weight: 500; cursor: pointer;
      transition: all 0.1s; text-align: center;
    }
    .pin-key:active { background: var(--border); transform: scale(0.95); }
    .pin-key-clear { color: var(--text2); font-size: 18px; }
    .pin-key-cancel { color: var(--accent3); font-size: 16px; }

    /* ADMIN BADGE */
    .admin-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: #e8c54718; border: 1px solid #e8c54740;
      color: var(--accent); border-radius: 20px;
      padding: 4px 10px; font-size: 11px; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
    }
    .admin-badge:active { opacity: 0.7; }
    .toast {
      position: fixed; top: 60px; left: 50%; transform: translateX(-50%) translateY(-20px);
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 12px 20px; border-radius: 50px;
      font-size: 14px; font-weight: 500; z-index: 200;
      opacity: 0; transition: all 0.3s; white-space: nowrap;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div id="loadingBar" style="position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#e8c547,#5b8dff);z-index:999;opacity:0;transition:opacity 0.3s;"></div>
<header>
  <div class="header-top">
    <div>
      <div class="header-title">🅿️ Bamb&uacute; cajones</div>
      <div class="header-date" id="headerDate"></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
      <button class="btn-add" onclick="openModal()">+</button>
      <span class="admin-badge" id="adminBadge" onclick="handleAdminBadge()">🔒 Admin</span>
    </div>
  </div>
</header>

<!-- CAJONES STATUS -->
<div class="status-section">
  <div class="section-label">Estado ahora</div>
  <div class="cajones-grid" id="cajonesGrid"></div>
</div>

<!-- NAV TABS -->
<div class="nav-tabs">
  <button class="nav-tab active" onclick="switchView('calendario', this)">Calendario</button>
  <button class="nav-tab" onclick="switchView('lista', this)">Lista</button>
</div>

<!-- VIEW: CALENDARIO -->
<div class="view active" id="view-calendario">
  <div class="week-nav">
    <button class="week-btn" onclick="changeWeek(-1)">‹</button>
    <span class="week-label" id="weekLabel"></span>
    <button class="week-btn" onclick="changeWeek(1)">›</button>
  </div>
  <div class="week-days" id="weekDays"></div>
  <div class="section-label" id="selectedDayLabel"></div>
  <div class="day-reservas" id="dayReservas"></div>
</div>

<!-- VIEW: LISTA -->
<div class="view" id="view-lista">
  <div id="listaContent"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnBg(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Nueva Reserva</div>

    <div class="form-group">
      <label class="form-label">CAJÓN</label>
      <div class="cajon-selector">
        <button class="cajon-opt" onclick="selectCajon(1, this)">C-1</button>
        <button class="cajon-opt" onclick="selectCajon(2, this)">C-2</button>
        <button class="cajon-opt" onclick="selectCajon(3, this)">C-3</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">CASA / VECINO</label>
      <select class="form-input" id="inputVecino">
        <option value="">— Selecciona una casa —</option>
        <option value="Casa 1">Casa 1</option>
        <option value="Casa 2">Casa 2</option>
        <option value="Casa 3">Casa 3</option>
        <option value="Casa 4">Casa 4</option>
        <option value="Casa 5">Casa 5</option>
        <option value="Casa 6">Casa 6</option>
        <option value="Casa 7">Casa 7</option>
        <option value="Casa 8">Casa 8</option>
        <option value="Casa 9">Casa 9</option>
        <option value="Casa 10">Casa 10</option>
        <option value="Casa 11">Casa 11</option>
        <option value="Casa 12">Casa 12</option>
        <option value="Casa 13">Casa 13</option>
        <option value="Casa 14">Casa 14</option>
        <option value="Casa 15">Casa 15</option>
        <option value="Casa 16">Casa 16</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">FECHA</label>
      <input class="form-input" id="inputFecha" type="date" />
    </div>

    <div class="form-group">
      <label class="form-label">HORARIO</label>
      <div class="time-row">
        <input class="form-input" id="inputDesde" type="time" placeholder="Desde" />
        <input class="form-input" id="inputHasta" type="time" placeholder="Hasta" />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">NOTA (opcional)</label>
      <input class="form-input" id="inputNota" type="text" placeholder="Ej: trae auto blanco" />
    </div>

    <button class="btn-submit" onclick="guardarReserva()">Guardar Reserva</button>
    <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="confirmOverlay">
  <div class="modal" style="padding-bottom:32px;">
    <div class="modal-handle"></div>
    <div class="modal-title" style="font-size:17px;" id="confirmMsg">¿Eliminar esta reserva?</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:24px;">
      <button class="btn-cancel" style="margin:0;" onclick="closeConfirmModal()">Cancelar</button>
      <button class="btn-submit" style="margin:0;background:var(--accent3);font-size:15px;" onclick="doConfirm()">Eliminar</button>
    </div>
  </div>
</div>

<!-- PIN MODAL -->
<div class="modal-overlay" id="pinOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="pinTitle">🔐 Acceso Admin</div>
    <p style="color:var(--text2);font-size:14px;margin-bottom:20px;" id="pinSubtitle">Ingresa tu PIN para eliminar esta reserva</p>
    <div class="pin-dots" id="pinDots">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>
      <div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-pad">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key pin-key-clear" onclick="pinClear()">⌫</button>
      <button class="pin-key" onclick="pinKey('0')">0</button>
      <button class="pin-key pin-key-cancel" onclick="closePinModal()">✕</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ─── FIREBASE ────────────────────────────────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyCZc9-Vyum_AHZbifRIOk3tHPZ9_TFi7-E",
    authDomain: "cajonesbambu.firebaseapp.com",
    projectId: "cajonesbambu",
    storageBucket: "cajonesbambu.firebasestorage.app",
    messagingSenderId: "137120786645",
    appId: "1:137120786645:web:cfea641a8324cd35c99a5c"
  };
  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  const colRef = collection(db, 'reservas');

  // ─── DATA ────────────────────────────────────────────────────────────────
  let reservas = [];
  let selectedCajon = null;
  let currentWeekOffset = 0;
  let selectedDate = null;
  const cajonNames = { 1: 'C-1', 2: 'C-2', 3: 'C-3' };

  // ─── LOADING ─────────────────────────────────────────────────────────────
  function showLoading() { document.getElementById('loadingBar').style.opacity = '1'; }
  function hideLoading() { document.getElementById('loadingBar').style.opacity = '0'; }

  // ─── TOAST (definido temprano para usarse en onSnapshot) ─────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  // Escucha en tiempo real — cualquier cambio en Firestore actualiza la UI
  // Sin orderBy para evitar requerir índice compuesto — ordenamos en JS
  onSnapshot(colRef, (snapshot) => {
    reservas = snapshot.docs
      .map(d => ({ id: d.id, ...d.data() }))
      .sort((a,b) => a.fecha.localeCompare(b.fecha) || a.desde.localeCompare(b.desde));
    renderAll();
    hideLoading();
  }, (err) => {
    console.error('Firebase error:', err.code, err.message);
    if (err.code === 'permission-denied') {
      showToast('⚠️ Permisos de Firestore: activa modo prueba');
    } else if (err.code === 'unavailable') {
      showToast('⚠️ Sin conexión a internet');
    } else {
      showToast('⚠️ Error Firebase: ' + err.code);
    }
    hideLoading();
  });

  // ─── DATE UTILS ──────────────────────────────────────────────────────────
  function today() { return toISO(new Date()); }
  function toISO(d) { return d.toISOString().split('T')[0]; }
  function addDays(iso, n) {
    const d = new Date(iso + 'T12:00:00');
    d.setDate(d.getDate() + n);
    return toISO(d);
  }
  function parseDate(iso) { return new Date(iso + 'T12:00:00'); }
  function formatDate(iso) {
    return parseDate(iso).toLocaleDateString('es-MX', { weekday: 'long', day: 'numeric', month: 'long' });
  }
  function formatShort(iso) {
    return parseDate(iso).toLocaleDateString('es-MX', { day: 'numeric', month: 'short' });
  }
  const days   = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

  function getWeekStart(offset) {
    const d = new Date();
    d.setDate(d.getDate() - d.getDay() + offset * 7);
    return toISO(d);
  }

  // ─── CURRENT STATUS ──────────────────────────────────────────────────────
  function renderCajones() {
    const now = new Date();
    const isoNow = today();
    const timeNow = now.getHours() * 60 + now.getMinutes();
    const grid = document.getElementById('cajonesGrid');
    grid.innerHTML = '';
    for (let c = 1; c <= 3; c++) {
      const activa = reservas.find(r => {
        if (r.fecha !== isoNow || r.cajon !== c) return false;
        const [sh, sm] = r.desde.split(':').map(Number);
        const [eh, em] = r.hasta.split(':').map(Number);
        return timeNow >= sh*60+sm && timeNow <= eh*60+em;
      });
      const libre = !activa;
      grid.innerHTML += `
        <div class="cajon-card c${c}">
          <div class="cajon-num">CAJÓN ${c}</div>
          <div>
            <span class="cajon-status-dot ${libre ? 'libre' : 'ocupado'}"></span>
            <span class="cajon-label">${libre ? 'Libre' : 'Ocupado'}</span>
          </div>
          <div class="cajon-who">${activa ? activa.vecino : '—'}</div>
        </div>`;
    }
  }

  // ─── CALENDAR ────────────────────────────────────────────────────────────
  function renderCalendar() {
    const weekStart = getWeekStart(currentWeekOffset);
    const ws = parseDate(weekStart);
    const we = parseDate(addDays(weekStart, 6));
    document.getElementById('weekLabel').textContent =
      `${ws.getDate()} ${months[ws.getMonth()].slice(0,3)} — ${we.getDate()} ${months[we.getMonth()].slice(0,3)}`;

    const grid = document.getElementById('weekDays');
    grid.innerHTML = '';
    const todayISO = today();
    if (!selectedDate) selectedDate = todayISO;

    for (let i = 0; i < 7; i++) {
      const iso = addDays(weekStart, i);
      const d   = parseDate(iso);
      const dr  = reservas.filter(r => r.fecha === iso);
      const dots = [1,2,3].map(c => {
        const colors = { 1:'#5b8dff', 2:'#e8c547', 3:'#7ecfa4' };
        return dr.some(r => r.cajon === c)
          ? `<div class="day-dot" style="background:${colors[c]}"></div>` : '';
      }).join('');
      const isToday    = iso === todayISO;
      const isSelected = iso === selectedDate;
      grid.innerHTML += `
        <div class="day-col" onclick="selectDay('${iso}')">
          <div class="day-name">${days[d.getDay()]}</div>
          <div class="day-num ${isToday && !isSelected ? 'today' : ''} ${isSelected ? 'selected' : ''}">${d.getDate()}</div>
          <div class="day-dots">${dots}</div>
        </div>`;
    }
    renderDayReservas();
  }

  window.selectDay = function(iso) { selectedDate = iso; renderCalendar(); };
  window.changeWeek = function(dir) { currentWeekOffset += dir; renderCalendar(); };

  function renderDayReservas() {
    const label     = document.getElementById('selectedDayLabel');
    const container = document.getElementById('dayReservas');
    if (!selectedDate) return;
    label.textContent = formatDate(selectedDate);
    const dr = reservas.filter(r => r.fecha === selectedDate)
                       .sort((a,b) => a.desde.localeCompare(b.desde));
    container.innerHTML = dr.length === 0
      ? `<div class="empty-state"><div class="empty-icon">🅿️</div>Sin reservas este día</div>`
      : dr.map(reservaCard).join('');
  }

  // ─── LIST VIEW ───────────────────────────────────────────────────────────
  function renderLista() {
    const container = document.getElementById('listaContent');
    const todayISO  = today();
    const upcoming  = reservas.filter(r => r.fecha >= todayISO);
    const past      = reservas.filter(r => r.fecha <  todayISO).reverse();
    let html = '';
    if (!upcoming.length && !past.length) {
      html = `<div class="empty-state"><div class="empty-icon">📋</div>No hay reservas todavía</div>`;
    } else {
      if (upcoming.length) html += `<div class="list-group"><div class="list-group-label">Próximas</div>${upcoming.map(reservaCard).join('')}</div>`;
      if (past.length)     html += `<div class="list-group" style="opacity:0.5"><div class="list-group-label">Pasadas</div>${past.map(reservaCard).join('')}</div>`;
    }
    container.innerHTML = html;
  }

  function reservaCard(r) {
    return `
      <div class="reserva-card">
        <div class="reserva-cajon-badge badge-c${r.cajon}">${cajonNames[r.cajon]}</div>
        <div class="reserva-info">
          <div class="reserva-vecino">${r.vecino}</div>
          <div class="reserva-horario">${formatShort(r.fecha)} · ${r.desde}–${r.hasta}</div>
          ${r.nota ? `<div class="reserva-nota">${r.nota}</div>` : ''}
        </div>
        <button class="reserva-delete" onclick="deleteReserva('${r.id}')">✕</button>
      </div>`;
  }

  // ─── MODAL NUEVA RESERVA ─────────────────────────────────────────────────
  window.openModal = function(prefillDate) {
    selectedCajon = null;
    document.getElementById('inputVecino').value = '';
    document.getElementById('inputFecha').value  = prefillDate || today();
    document.getElementById('inputDesde').value  = '';
    document.getElementById('inputHasta').value  = '';
    document.getElementById('inputNota').value   = '';
    document.querySelectorAll('.cajon-opt').forEach(b => b.className = 'cajon-opt');
    document.getElementById('modalOverlay').classList.add('open');
  };
  window.closeModal = function() { document.getElementById('modalOverlay').classList.remove('open'); };
  window.closeModalOnBg = function(e) { if (e.target.id === 'modalOverlay') window.closeModal(); };

  window.selectCajon = function(n, el) {
    selectedCajon = n;
    document.querySelectorAll('.cajon-opt').forEach(b => b.className = 'cajon-opt');
    el.className = `cajon-opt selected-c${n}`;
  };

  window.guardarReserva = async function() {
    const vecino = document.getElementById('inputVecino').value.trim();
    const fecha  = document.getElementById('inputFecha').value;
    const desde  = document.getElementById('inputDesde').value;
    const hasta  = document.getElementById('inputHasta').value;
    const nota   = document.getElementById('inputNota').value.trim();

    if (!selectedCajon)      { showToast('⚠️ Selecciona un cajón');   return; }
    if (!vecino)             { showToast('⚠️ Selecciona una casa');    return; }
    if (!fecha)              { showToast('⚠️ Selecciona la fecha');    return; }
    if (!desde || !hasta)    { showToast('⚠️ Ingresa el horario');     return; }
    if (desde >= hasta)      { showToast('⚠️ El horario es inválido'); return; }

    const conflicto = reservas.find(r => {
      if (r.cajon !== selectedCajon || r.fecha !== fecha) return false;
      return desde < r.hasta && hasta > r.desde;
    });
    if (conflicto) { showToast(`⚠️ C-${selectedCajon} ya está reservado`); return; }

    try {
      showLoading();
      await addDoc(colRef, { cajon: selectedCajon, vecino, fecha, desde, hasta, nota });
      window.closeModal();
      showToast(`✓ Reserva guardada para ${vecino}`);
    } catch(e) {
      console.error(e);
      showToast('⚠️ Error al guardar');
    } finally {
      hideLoading();
    }
  };

  // ─── PIN / ADMIN ─────────────────────────────────────────────────────────
  const ADMIN_PIN     = '1234'; // ← Cambia este PIN
  const ADMIN_TIMEOUT = 5 * 60 * 1000;
  let isAdmin    = false;
  let adminTimer = null;
  let pinBuffer  = '';
  let pinAction  = null;

  function setAdminSession(val) {
    isAdmin = val;
    const badge = document.getElementById('adminBadge');
    if (val) {
      badge.textContent = '🔓 Admin';
      badge.style.cssText = 'background:#7ecfa418;border-color:#7ecfa440;color:#7ecfa4;';
      clearTimeout(adminTimer);
      adminTimer = setTimeout(() => { setAdminSession(false); showToast('Sesión admin cerrada'); }, ADMIN_TIMEOUT);
    } else {
      badge.textContent = '🔒 Admin';
      badge.style.cssText = 'background:#e8c54718;border-color:#e8c54740;color:var(--accent);';
    }
  }

  window.handleAdminBadge = function() {
    if (isAdmin) { setAdminSession(false); showToast('Sesión admin cerrada'); }
    else openPinModal(() => showToast('✓ Modo admin activado (5 min)'));
  };

  function openPinModal(onSuccess) {
    pinBuffer = ''; pinAction = onSuccess;
    updatePinDots();
    document.getElementById('pinOverlay').classList.add('open');
  }
  window.closePinModal = function() {
    document.getElementById('pinOverlay').classList.remove('open');
    pinBuffer = ''; pinAction = null;
  };
  window.pinKey = function(k) {
    if (pinBuffer.length >= 4) return;
    pinBuffer += k; updatePinDots();
    if (pinBuffer.length === 4) setTimeout(checkPin, 150);
  };
  window.pinClear = function() { pinBuffer = pinBuffer.slice(0,-1); updatePinDots(); };

  function updatePinDots() {
    for (let i = 0; i < 4; i++) {
      const dot = document.getElementById('pd'+i);
      dot.classList.remove('filled','error');
      if (i < pinBuffer.length) dot.classList.add('filled');
    }
  }
  function checkPin() {
    if (pinBuffer === ADMIN_PIN) {
      setAdminSession(true);
      window.closePinModal();
      if (pinAction) pinAction();
      renderAll();
    } else {
      for (let i=0;i<4;i++) {
        const dot = document.getElementById('pd'+i);
        dot.classList.remove('filled'); dot.classList.add('error');
      }
      showToast('⚠️ PIN incorrecto');
      setTimeout(() => { pinBuffer = ''; updatePinDots(); }, 800);
    }
  }

  // ─── DELETE ──────────────────────────────────────────────────────────────
  window.deleteReserva = function(id) {
    if (!isAdmin) {
      openPinModal(() => setTimeout(() => window.deleteReserva(id), 200));
      return;
    }
    openConfirmModal('¿Eliminar esta reserva?', async () => {
      try {
        showLoading();
        await deleteDoc(doc(db, 'reservas', id));
        showToast('Reserva eliminada');
      } catch(e) {
        console.error(e);
        showToast('⚠️ Error al eliminar');
      } finally {
        hideLoading();
      }
    });
  };

  // ─── CONFIRM MODAL ───────────────────────────────────────────────────────
  let _confirmCallback = null;
  function openConfirmModal(msg, onConfirm) {
    _confirmCallback = onConfirm;
    document.getElementById('confirmMsg').textContent = msg;
    document.getElementById('confirmOverlay').classList.add('open');
  }
  window.closeConfirmModal = function() {
    document.getElementById('confirmOverlay').classList.remove('open');
    _confirmCallback = null;
  };
  window.doConfirm = function() {
    const cb = _confirmCallback;
    window.closeConfirmModal();
    if (cb) cb();
  };

  // ─── VIEWS ───────────────────────────────────────────────────────────────
  window.switchView = function(name, btn) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
    document.getElementById('view-'+name).classList.add('active');
    btn.classList.add('active');
    if (name === 'lista') renderLista();
  };

  function renderAll() {
    renderCajones();
    renderCalendar();
    if (document.getElementById('view-lista').classList.contains('active')) renderLista();
  }

  // ─── TOAST (definida arriba, cerca de onSnapshot) ───────────────────────

  // ─── INIT ─────────────────────────────────────────────────────────────────
  const d = new Date();
  document.getElementById('headerDate').textContent =
    d.toLocaleDateString('es-MX', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  showLoading();
  setInterval(renderCajones, 60000);
</script>
</body>
</html>
